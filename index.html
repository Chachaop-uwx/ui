<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jeu 3D Coin Coin</title>
<style>
  body { margin: 0; overflow: hidden; }
  #info {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
  }
</style>
</head>
<body>

<div id="info">
  ZQSD / Flèches = bouger<br>
  E = tirer<br>
  ESPACE = sauter
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// 🎬 SCÈNE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // ciel bleu

// 🎥 CAMÉRA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// 🎨 RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌍 SOL
const groundGeometry = new THREE.PlaneGeometry(100, 100);
const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22 });
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// ☀️ LUMIÈRE
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// 👤 JOUEUR (cube temporaire)
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color: 0x0000ff })
);
player.position.y = 1;
scene.add(player);

// 🎥 CAMÉRA suit le joueur
camera.position.set(0, 2, 5);

// 🎮 CONTRÔLES
let keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// 🦘 saut
let velocityY = 0;
let isOnGround = true;

// 🔫 tirer
function shoot() {
  const bullet = new THREE.Mesh(
    new THREE.SphereGeometry(0.2),
    new THREE.MeshBasicMaterial({ color: 0xff0000 })
  );

  bullet.position.copy(player.position);
  scene.add(bullet);

  const direction = new THREE.Vector3(0,0,-1);
  
  function moveBullet() {
    bullet.position.add(direction);
    requestAnimationFrame(moveBullet);
  }
  moveBullet();
}

// 🎯 GAME LOOP
function animate() {
  requestAnimationFrame(animate);

  // déplacement
  if(keys["z"] || keys["arrowup"]) player.position.z -= 0.1;
  if(keys["s"] || keys["arrowdown"]) player.position.z += 0.1;
  if(keys["q"] || keys["arrowleft"]) player.position.x -= 0.1;
  if(keys["d"] || keys["arrowright"]) player.position.x += 0.1;

  // saut
  if(keys[" "] && isOnGround) {
    velocityY = 0.2;
    isOnGround = false;
  }

  velocityY -= 0.01;
  player.position.y += velocityY;

  if(player.position.y <= 1) {
    player.position.y = 1;
    isOnGround = true;
  }

  // tirer
  if(keys["e"]) {
    shoot();
    keys["e"] = false;
  }

  // caméra suit
  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 5;
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

animate();

// 📱 resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
