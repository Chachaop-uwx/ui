<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Attrape le Coin Coin</title>

<style>
  body {
    text-align: center;
    font-family: Arial;
    background: white;
  }

  h1 {
    margin-top: 20px;
  }

  #game {
    position: relative;
    width: 400px;
    height: 400px;
    margin: 20px auto;
    border: 2px solid black;
    overflow: hidden;
  }

  #duck {
    position: absolute;
    font-size: 50px;
    cursor: pointer;
  }

  #score, #timer {
    font-size: 20px;
    margin: 10px;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>🦆 Attrape le Coin Coin !</h1>

<div id="score">Score : 0</div>
<div id="timer">Temps : 10</div>

<button onclick="startGame()">Démarrer</button>

<div id="game">
  <div id="duck">🦆</div>
</div>

<script>
let score = 0;
let timeLeft = 10;
let gameInterval;
let moveInterval;

const duck = document.getElementById("duck");

function moveDuck() {
  const duckWidth = duck.offsetWidth;
  const duckHeight = duck.offsetHeight;
  const gameWidth = 400;
  const gameHeight = 400;

  const x = Math.random() * (gameWidth - duckWidth);
  const y = Math.random() * (gameHeight - duckHeight);

  duck.style.left = x + "px";
  duck.style.top = y + "px";
}

duck.onclick = function() {
  score++;
  document.getElementById("score").textContent = "Score : " + score;
};

function startGame() {
  score = 0;
  timeLeft = 10;

  document.getElementById("score").textContent = "Score : 0";
  document.getElementById("timer").textContent = "Temps : 10";

  moveDuck();

  // Déplacement plus lent du canard
  moveInterval = setInterval(moveDuck, 1200); // 1200 ms au lieu de 700 ms

  gameInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").textContent = "Temps : " + timeLeft;

    if(timeLeft <= 0) {
      clearInterval(gameInterval);
      clearInterval(moveInterval);
      alert("Fin du jeu ! Score : " + score);
    }
  }, 1000);
}
</script>

</body>
</html>
